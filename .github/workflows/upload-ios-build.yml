name: Upload iOS Build

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number. Defaults to the GitHub run number."
        required: false
        type: string

permissions:
  contents: read

jobs:
  archive-and-upload:
    name: Archive and Upload to App Store Connect
    runs-on: macos-15
    timeout-minutes: 60

    env:
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUNDLE_IDENTIFIER: com.streamstageai.app
      CONFIGURATION: Release
      MARKETING_VERSION: "1.0"
      PROJECT_PATH: StreamStageAI.xcodeproj
      SCHEME: StreamStageAI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_ISSUER_ID ASC_KEY_ID ASC_PRIVATE_KEY APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Write App Store Connect API key
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$ASC_KEY_PATH")" "$HOME/private_keys"
          python3 - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["ASC_PRIVATE_KEY"].strip().replace("\\n", "\n")
          if not key.endswith("\n"):
              key += "\n"
          path = Path(os.environ["ASC_KEY_PATH"])
          path.write_text(key, encoding="utf-8")
          (Path.home() / "private_keys" / path.name).write_text(key, encoding="utf-8")
          PY
          chmod 600 "$ASC_KEY_PATH" "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          plutil -lint "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive
        run: |
          set -euo pipefail
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi
          echo "Archiving $BUNDLE_IDENTIFIER version $MARKETING_VERSION build $BUILD_NUMBER"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/StreamStageAI.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/StreamStageAI.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution"
          IPA_PATH="$(find "$RUNNER_TEMP/export" -maxdepth 1 -name "*.ipa" -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA to App Store Connect
        run: |
          set -euo pipefail
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: StreamStageAI-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
